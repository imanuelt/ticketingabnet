{% extends "base.html" %}

{% block content %}
<section class="unauthorized-panel glass-panel">
    <p class="eyebrow">Access denied</p>
    <h2>This workspace is restricted to approved users inside the tenant.</h2>
    <p>Your account must be assigned the <span class="inline-pill">{{ required_role }}</span> app role.</p>
    {% if user %}
    <p>Signed in as {{ user.email }}.</p>
    {% endif %}
</section>
{% endblock %}
